name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download macOS speedtest CLI
        run: |
          curl -L -o speedtest.zip "https://install.speedtest.net/app/cli/ookla-speedtest-1.2.0-macosx-universal.tgz"
          tar -xzf speedtest.zip
          mkdir -p assets
          cp speedtest assets/speedtest
          chmod +x assets/speedtest

      - name: Create macOS icon
        run: |
          set -euo pipefail
          mkdir -p assets
          SRC=""
          if [ -f assets/new_icon.png ]; then
            SRC="assets/new_icon.png"
          else
            SRC=$(find assets -maxdepth 1 -name '*.png' -type f 2>/dev/null | sort | head -n 1 || true)
          fi
          if [ -z "$SRC" ] && [ -f assets/app.ico ]; then
            sips -s format png assets/app.ico --out /tmp/macos_icon_src.png
            SRC="/tmp/macos_icon_src.png"
          fi
          if [ -z "$SRC" ]; then
            echo "No icon source found: add assets/new_icon.png, a PNG under assets/, or assets/app.ico" >&2
            exit 1
          fi
          echo "Icon source: $SRC"
          rm -rf icon.iconset
          mkdir -p icon.iconset
          sips -z 16 16     "$SRC" --out icon.iconset/icon_16x16.png
          sips -z 32 32     "$SRC" --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     "$SRC" --out icon.iconset/icon_32x32.png
          sips -z 64 64     "$SRC" --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   "$SRC" --out icon.iconset/icon_128x128.png
          sips -z 256 256   "$SRC" --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   "$SRC" --out icon.iconset/icon_256x256.png
          sips -z 512 512   "$SRC" --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   "$SRC" --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 "$SRC" --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/app.icns

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller ANT-mac.spec

      - name: Zip the app bundle
        run: |
          cd dist
          zip -r AdvancedNetworkTool-macOS.zip AdvancedNetworkTool.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedNetworkTool-macOS
          path: dist/AdvancedNetworkTool-macOS.zip
          retention-days: 30
